<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Server Info — casspeed Admin</title>
  <link rel="stylesheet" href="/static/css/theme-dark.css">
  <link rel="stylesheet" href="/static/css/theme-light.css">
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="/static/css/admin/style.css">
  <script src="/static/js/theme.js"></script>
</head>
<body>
  <div class="admin-layout">
    <nav class="admin-nav" aria-label="Admin navigation">
      <a href="/server/admin/" class="admin-nav__brand">
        <span class="admin-nav__logo">casspeed</span>
        <span class="admin-nav__badge">Admin</span>
      </a>
      <div class="admin-nav__section">
        <ul>
          <li><a href="/server/admin/"><span class="nav-icon" aria-hidden="true">◈</span> Dashboard</a></li>
          <li><a href="/server/admin/config/settings"><span class="nav-icon" aria-hidden="true">⚙</span> Settings</a></li>
          <li><a href="/server/admin/config/info" class="active" aria-current="page"><span class="nav-icon" aria-hidden="true">ℹ</span> Server Info</a></li>
          <li><a href="/server/admin/config/logs"><span class="nav-icon" aria-hidden="true">≡</span> Logs</a></li>
        </ul>
      </div>
      <div class="admin-nav__footer">
        <a href="/">← Speed Test</a>
        <a href="/server/admin/logout">Logout</a>
      </div>
    </nav>
    <div class="admin-main">
      <main id="main-content" class="admin-content" aria-label="Server information">
        <h1 class="admin-page-title">Server Info</h1>
        <p class="admin-page-subtitle">Runtime details and environment</p>
        <div class="card">
          <div class="card__header">
            <div class="card__title">Runtime</div>
            <span class="badge badge--ok"><span class="badge__dot"></span> Running</span>
          </div>
          <table class="admin-table">
            <tbody>
              <tr>
                <td style="font-weight:600;color:var(--fg-muted);width:40%">Version</td>
                <td>{{.Version}}</td>
              </tr>
              <tr>
                <td style="font-weight:600;color:var(--fg-muted)">Mode</td>
                <td>{{.Mode}}</td>
              </tr>
              <tr>
                <td style="font-weight:600;color:var(--fg-muted)">Uptime</td>
                <td>{{.Uptime}}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </div>
</body>
</html>
