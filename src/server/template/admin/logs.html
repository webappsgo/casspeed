<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logs — casspeed Admin</title>
  <link rel="stylesheet" href="/static/css/theme-dark.css">
  <link rel="stylesheet" href="/static/css/theme-light.css">
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="/static/css/admin/style.css">
  <script src="/static/js/theme.js"></script>
</head>
<body>
  <div class="admin-layout">
    <nav class="admin-nav" aria-label="Admin navigation">
      <a href="/server/admin/" class="admin-nav__brand">
        <span class="admin-nav__logo">casspeed</span>
        <span class="admin-nav__badge">Admin</span>
      </a>
      <div class="admin-nav__section">
        <ul>
          <li><a href="/server/admin/"><span class="nav-icon" aria-hidden="true">◈</span> Dashboard</a></li>
          <li><a href="/server/admin/config/settings"><span class="nav-icon" aria-hidden="true">⚙</span> Settings</a></li>
          <li><a href="/server/admin/config/info"><span class="nav-icon" aria-hidden="true">ℹ</span> Server Info</a></li>
          <li><a href="/server/admin/config/logs" class="active" aria-current="page"><span class="nav-icon" aria-hidden="true">≡</span> Logs</a></li>
        </ul>
      </div>
      <div class="admin-nav__footer">
        <a href="/">← Speed Test</a>
        <a href="/server/admin/logout">Logout</a>
      </div>
    </nav>
    <div class="admin-main">
      <main id="main-content" class="admin-content" aria-label="Server logs">
        <h1 class="admin-page-title">Logs</h1>
        <p class="admin-page-subtitle">Application and access logs</p>
        <div class="card">
          <div class="card__header">
            <div class="card__title">Application Log</div>
          </div>
          <div class="log-viewer" aria-label="Application log output" role="log" aria-live="polite">
            {{if .Logs}}{{.Logs}}{{else}}No log entries available.{{end}}
          </div>
        </div>
      </main>
    </div>
  </div>
</body>
</html>
