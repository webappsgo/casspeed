name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ensure-build-image:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      image: ${{ steps.pull.outputs.image }}
    steps:
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: pull
        name: Pull build image (fail fast if missing)
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:build"
          if ! docker pull "$IMAGE"; then
            echo "::error::Build image $IMAGE not found."
            echo "::error::Trigger the 'Build Toolchain Image' workflow (workflow_dispatch) to create it."
            echo "::error::Never commit ci.yml or release.yml before the build image exists in the registry."
            exit 1
          fi
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  lint:
    if: github.event_name != 'schedule'
    needs: ensure-build-image
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.ensure-build-image.outputs.image }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - run: go vet ./...
      - run: staticcheck ./...

  test:
    if: github.event_name != 'schedule'
    needs: ensure-build-image
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.ensure-build-image.outputs.image }}
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - run: go test -cover -coverprofile=coverage.out ./...
      - name: Enforce coverage threshold
        run: |
          THRESHOLD=60
          PCT=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%","",$3); print int($3)}')
          if [ "$PCT" -lt "$THRESHOLD" ]; then
            echo "::error::coverage $PCT% < threshold $THRESHOLD%"
            exit 1
          fi

  build:
    if: github.event_name != 'schedule'
    needs: [ensure-build-image, lint, test]
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.ensure-build-image.outputs.image }}
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Set build info
        run: |
          if [ -f release.txt ]; then echo "VERSION=$(cat release.txt)" >> $GITHUB_ENV; else echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV; fi
          echo "COMMIT_ID=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date +"%a %b %d, %Y at %H:%M:%S %Z")" >> $GITHUB_ENV
      - run: |
          LDFLAGS="-s -w -X 'main.Version=${{ env.VERSION }}' -X 'main.CommitID=${{ env.COMMIT_ID }}' -X 'main.BuildDate=${{ env.BUILD_DATE }}'"
          go build -ldflags "$LDFLAGS" ./...

  vuln-check:
    needs: ensure-build-image
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.ensure-build-image.outputs.image }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - run: govulncheck ./...

  secret-scan:
    needs: ensure-build-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@79636f40e5e88df7e82b1fb08c22c4acdb9d29e9
        with:
          base: ${{ github.event.before }}
          head: ${{ github.event.after || github.sha }}
          extra_args: --only-verified
